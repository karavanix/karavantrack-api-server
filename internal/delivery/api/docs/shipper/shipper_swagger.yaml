basePath: /api/v1
definitions:
  command.AddCarrierRequest:
    properties:
      alias:
        type: string
      carrier_id:
        type: string
    required:
    - alias
    - carrier_id
    type: object
  command.AddMemberRequest:
    properties:
      alias:
        type: string
      role:
        enum:
        - admin
        - member
        type: string
      user_id:
        type: string
    required:
    - alias
    - role
    - user_id
    type: object
  command.AssignRequest:
    properties:
      carrier_id:
        type: string
    required:
    - carrier_id
    type: object
  command.InviteRequest:
    properties:
      contact:
        type: string
      role:
        type: string
    required:
    - contact
    - role
    type: object
  command.InviteResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  command.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  command.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  command.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  command.RegisterDeviceRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      device_token:
        type: string
      device_type:
        type: string
    required:
    - device_id
    - device_token
    type: object
  command.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      phone:
        type: string
      role:
        enum:
        - shipper
        - carrier
        type: string
    required:
    - password
    - role
    type: object
  command.RegisterResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      role:
        type: string
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateRequest:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.UpdateRequest:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateRequest:
    properties:
      carrier_id:
        type: string
      company_id:
        type: string
      description:
        type: string
      dropoff_address:
        type: string
      dropoff_at:
        type: string
      dropoff_lat:
        type: number
      dropoff_lng:
        type: number
      pickup_address:
        type: string
      pickup_at:
        type: string
      pickup_lat:
        type: number
      pickup_lng:
        type: number
      reference_id:
        type: string
      title:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - company_id
    - dropoff_lat
    - dropoff_lng
    - pickup_lat
    - pickup_lng
    - title
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateResponse:
    properties:
      id:
        type: string
      status:
        type: string
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_users_command.UpdateRequest:
    properties:
      first_name:
        type: string
      last_name:
        type: string
    type: object
  outerr.Response:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  query.CompanyResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      status:
        type: string
    type: object
  query.GetCarrierByContactResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  query.GetShipperByContactResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  query.GetStatsResponse:
    properties:
      active:
        type: integer
      canceled:
        type: integer
      completed:
        type: integer
      pending:
        type: integer
      total:
        type: integer
    type: object
  query.GetTrackResponse:
    properties:
      load_id:
        type: string
      points:
        items:
          $ref: '#/definitions/query.TrackPointResponse'
        type: array
      total:
        type: integer
    type: object
  query.ListCarriersResponse:
    properties:
      alias:
        type: string
      carrier_id:
        type: string
      created_at:
        type: string
      first_name:
        type: string
      is_free:
        type: boolean
      is_invited:
        type: boolean
      last_name:
        type: string
    type: object
  query.LoadResponse:
    properties:
      carrier_id:
        type: string
      company_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      dropoff_address:
        type: string
      dropoff_at:
        type: string
      dropoff_lat:
        type: number
      dropoff_lng:
        type: number
      id:
        type: string
      member_id:
        type: string
      pickup_address:
        type: string
      pickup_at:
        type: string
      pickup_lat:
        type: number
      pickup_lng:
        type: number
      reference_id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  query.MeResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
      status:
        type: string
    type: object
  query.MemberResponse:
    properties:
      alias:
        type: string
      company_id:
        type: string
      created_at:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      member_id:
        type: string
      role:
        type: string
    type: object
  query.PositionResponse:
    properties:
      accuracy_m:
        type: number
      carrier_id:
        type: string
      heading_deg:
        type: number
      lat:
        type: number
      lng:
        type: number
      load_id:
        type: string
      recorded_at:
        type: string
      speed_mps:
        type: number
    type: object
  query.TrackPointResponse:
    properties:
      accuracy_m:
        type: number
      heading_deg:
        type: number
      lat:
        type: number
      lng:
        type: number
      recorded_at:
        type: string
      speed_mps:
        type: number
    type: object
info:
  contact: {}
  title: Shippers API
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email/phone and password
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/command.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user (invalidate session)
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new token pair
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/command.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      summary: Refresh tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user and return tokens
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/command.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/outerr.Response'
      summary: Register
      tags:
      - Auth
  /companies:
    get:
      description: List companies for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.CompanyResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List companies
      tags:
      - Companies
    post:
      consumes:
      - application/json
      description: Create a new company
      parameters:
      - description: Create Company Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Create company
      tags:
      - Companies
  /companies/{id}:
    get:
      description: Get company by ID
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/query.CompanyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/outerr.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get company
      tags:
      - Companies
    put:
      consumes:
      - application/json
      description: Update company details by ID (owner/admin only)
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Company Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Update company
      tags:
      - Companies
  /companies/{id}/carriers:
    get:
      description: List carriers for a specific company
      parameters:
      - description: Search query by (alias, first_name, last_name, email, phone)
        in: query
        name: q
        type: string
      - description: Pagination Limit
        in: query
        name: limit
        type: integer
      - description: Pagination Offset
        in: query
        name: offset
        type: integer
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.ListCarriersResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List company carriers
      tags:
      - Companies
    post:
      consumes:
      - application/json
      description: Add an existing carrier to the company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Add Carrier Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.AddCarrierRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Add carrier to company
      tags:
      - Companies
  /companies/{id}/carriers/{carrier_id}:
    delete:
      description: Remove a carrier from the company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Carrier ID
        in: path
        name: carrier_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Remove carrier from company
      tags:
      - Companies
  /companies/{id}/loads:
    get:
      description: List loads for a specific company with filters
      parameters:
      - description: Company ID
        in: path
        name: id
        type: string
      - collectionFormat: multi
        description: Status filter
        in: query
        items:
          enum:
          - created
          - assigned
          - accepted
          - in_transit
          - completed
          - confirmed
          - cancelled
          type: string
        name: status
        type: array
      - description: Pagination Limit
        in: query
        name: limit
        type: integer
      - description: Pagination Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.LoadResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List company loads
      tags:
      - Companies
  /companies/{id}/loads/stats:
    get:
      description: Get load by ID
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/query.GetStatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get load
      tags:
      - Loads
  /companies/{id}/members:
    get:
      description: List members of a company
      parameters:
      - description: Search query by (alias, first_name, last_name, email, phone)
        in: query
        name: q
        type: string
      - description: Pagination Limit
        in: query
        name: limit
        type: integer
      - description: Pagination Offset
        in: query
        name: offset
        type: integer
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.MemberResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List members
      tags:
      - Companies
    post:
      consumes:
      - application/json
      description: Add a new member to the company (owner/admin only)
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Add Member Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.AddMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Add member
      tags:
      - Companies
  /companies/{id}/members/{user_id}:
    delete:
      description: Remove a member from the company (owner only)
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Remove member
      tags:
      - Companies
  /loads:
    post:
      consumes:
      - application/json
      description: Create a new load
      parameters:
      - description: Create Load Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Create load
      tags:
      - Loads
  /loads/{id}:
    get:
      description: Get load by ID
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/query.LoadResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get load
      tags:
      - Loads
  /loads/{id}/assign:
    post:
      consumes:
      - application/json
      description: Assign load to a carrier and truck
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      - description: Assign Load Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.AssignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Assign load
      tags:
      - Loads
  /loads/{id}/cancel:
    post:
      description: Cancel a load
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Cancel load
      tags:
      - Loads
  /loads/{id}/confirm:
    post:
      description: Confirm a completed load delivery (by company/dispatcher)
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Confirm load delivery
      tags:
      - Loads
  /loads/{id}/position:
    get:
      description: Get current tracked position for a load (latest GPS point)
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/query.PositionResponse'
        "400":
          description: Bad Request
          schema:
