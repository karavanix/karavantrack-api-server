basePath: /api/v1
definitions:
  auth.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  command.AddMemberRequest:
    properties:
      alias:
        type: string
      role:
        enum:
        - admin
        - member
        type: string
      user_id:
        type: string
    required:
    - alias
    - role
    - user_id
    type: object
  command.AddToCompanyRequest:
    properties:
      alias:
        type: string
      driver_id:
        type: string
    required:
    - alias
    - driver_id
    type: object
  command.AssignRequest:
    properties:
      driver_id:
        type: string
    required:
    - driver_id
    type: object
  command.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  command.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  command.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      phone:
        type: string
    required:
    - password
    type: object
  command.RegisterResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  command.UpdateRequest:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateRequest:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_drivers_command.CreateResponse:
    properties:
      id:
        type: string
      user_id:
        type: string
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateRequest:
    properties:
      company_id:
        type: string
      description:
        type: string
      dropoff_address:
        type: string
      dropoff_lat:
        type: number
      dropoff_lng:
        type: number
      pickup_address:
        type: string
      pickup_lat:
        type: number
      pickup_lng:
        type: number
      title:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - company_id
    - dropoff_lat
    - dropoff_lng
    - pickup_lat
    - pickup_lng
    - title
    type: object
  github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateResponse:
    properties:
      id:
        type: string
      status:
        type: string
    type: object
  outerr.Response:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  query.CompanyDriverResponse:
    properties:
      alias:
        type: string
      created_at:
        type: string
      driver_id:
        type: string
      user_id:
        type: string
    type: object
  query.CompanyResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      status:
        type: string
    type: object
  query.DriverResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      user_id:
        type: string
    type: object
  query.LoadResponse:
    properties:
      company_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      driver_id:
        type: string
      dropoff_address:
        type: string
      dropoff_at:
        type: string
      dropoff_lat:
        type: number
      dropoff_lng:
        type: number
      id:
        type: string
      member_id:
        type: string
      pickup_address:
        type: string
      pickup_at:
        type: string
      pickup_lat:
        type: number
      pickup_lng:
        type: number
      reference_id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  query.MemberResponse:
    properties:
      alias:
        type: string
      company_id:
        type: string
      created_at:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  security.TokenDetails:
    properties:
      accessExpiresAt:
        type: string
      accessToken:
        type: string
      refreshExpiresAt:
        type: string
      refreshJTI:
        type: string
      refreshToken:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Documentation of the Karavantrack API server
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Karavantrack API Documentation
  version: 0.0.1
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email/phone and password
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/command.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user (invalidate session)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new token pair
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/security.TokenDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      summary: Refresh tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user and return tokens
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/command.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/outerr.Response'
      summary: Register
      tags:
      - Auth
  /companies:
    get:
      description: List companies for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.CompanyResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List companies
      tags:
      - Companies
    post:
      consumes:
      - application/json
      description: Create a new company
      parameters:
      - description: Create Company Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_companies_command.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Create company
      tags:
      - Companies
  /companies/{id}:
    get:
      description: Get company by ID
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/query.CompanyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get company
      tags:
      - Companies
    put:
      consumes:
      - application/json
      description: Update company details by ID
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Company Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Update company
      tags:
      - Companies
  /companies/{id}/members:
    get:
      description: List members of a company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.MemberResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List members
      tags:
      - Companies
    post:
      consumes:
      - application/json
      description: Add a new member to the company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Add Member Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.AddMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Add member
      tags:
      - Companies
  /companies/{id}/members/{userId}:
    delete:
      description: Remove a member from the company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Remove member
      tags:
      - Companies
  /drivers:
    post:
      description: Create a new driver profile for the current user
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_drivers_command.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Create driver
      tags:
      - Drivers
  /drivers/{id}:
    get:
      description: Get driver profile by ID
      parameters:
      - description: Driver ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/query.DriverResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get driver
      tags:
      - Drivers
  /drivers/company/{companyId}:
    get:
      description: List drivers associated with a company
      parameters:
      - description: Company ID
        in: path
        name: companyId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.CompanyDriverResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List drivers by company
      tags:
      - Drivers
    post:
      consumes:
      - application/json
      description: Add an existing driver to a company
      parameters:
      - description: Company ID
        in: path
        name: companyId
        required: true
        type: string
      - description: Add To Company Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.AddToCompanyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Add driver to company
      tags:
      - Drivers
  /drivers/company/{companyId}/{driverId}:
    delete:
      description: Remove a driver from a company
      parameters:
      - description: Company ID
        in: path
        name: companyId
        required: true
        type: string
      - description: Driver ID
        in: path
        name: driverId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Remove driver from company
      tags:
      - Drivers
  /loads:
    get:
      description: List loads with optional filters
      parameters:
      - description: Company ID filter
        in: query
        name: company_id
        type: string
      - description: Driver ID filter
        in: query
        name: driver_id
        type: string
      - description: Status filter
        in: query
        name: status
        type: string
      - description: Pagination Limit
        in: query
        name: limit
        type: integer
      - description: Pagination Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/query.LoadResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: List loads
      tags:
      - Loads
    post:
      consumes:
      - application/json
      description: Create a new load
      parameters:
      - description: Create Load Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_karavanix_karavantrack-api-server_internal_usecase_loads_command.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Create load
      tags:
      - Loads
  /loads/{id}:
    get:
      description: Get load by ID
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/query.LoadResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get load
      tags:
      - Loads
  /loads/{id}/accept:
    post:
      description: Accept an assigned load (by driver)
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Accept load
      tags:
      - Loads
  /loads/{id}/assign:
    post:
      consumes:
      - application/json
      description: Assign load to a driver and truck
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      - description: Assign Load Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/command.AssignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/outerr.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Assign load
      tags:
      - Loads
  /loads/{id}/cancel:
    post:
      description: Cancel a load
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Cancel load
      tags:
      - Loads
  /loads/{id}/complete:
    post:
      description: Complete a load (by driver)
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Complete load
      tags:
      - Loads
  /loads/{id}/confirm:
    post:
      description: Confirm a completed load delivery (by company/dispatcher)
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Confirm load delivery
      tags:
      - Loads
  /loads/{id}/position:
    get:
      description: Get current tracked position for a load
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get current position
      tags:
      - Loads
  /loads/{id}/start:
    post:
      description: Start a load (by driver, transitions to in-transit)
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Start load
      tags:
      - Loads
  /loads/{id}/track:
    get:
      description: Get location history tracking for a load
      parameters:
      - description: Load ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/outerr.Response'
      security:
      - BearerAuth: []
      summary: Get load track
      tags:
      - Loads
  /ws:
    get:
      consumes:
      - application/json
      description: Upgrades HTTP connection to a full-duplex WebSocket.
      parameters:
      - description: JWT authentication token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "400":
          description: Bad request (missing/invalid headers)
          schema:
            $ref: '#/definitions/outerr.Response'
      summary: WebSocket endpoint for chat
      tags:
      - WebSocket
securityDefinitions:
  BasicAuth:
    type: basic
  BearerAuth:
    description: API Токен используется для авторизации
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
